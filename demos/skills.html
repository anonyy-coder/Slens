<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SkillLens - Included Skills</title>
  <style>
:root {
  --teal-shell-from: #053a43;
  --teal-shell-to: #0c5f72;
  --aqua: #22d7cf;
  --aqua-edge: rgba(34, 215, 207, 0.32);
  --paper-0: #f9f7ee;
  --paper-1: #fbf8f1;
  --paper-2: #f5efe5;
  --ink-deep: #082f3b;
  --ink-soft: #526c7b;
  --ink-faint: #6e8490;
  --gold: #c98b23;
  --hairline: rgba(24, 78, 92, 0.13);
  --shadow-card: 0 18px 44px rgba(20, 45, 58, 0.1);
  --shadow-soft: 0 20px 60px rgba(28, 49, 61, 0.08);
  --success: #237a3d;
  --success-soft: rgba(35, 122, 61, 0.13);
  --warning: #a06c10;
  --warning-soft: rgba(181, 116, 18, 0.14);
  --neutral: #6d6173;
  --neutral-soft: rgba(109, 97, 115, 0.12);
}

* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }

body {
  min-height: 100vh;
  color: var(--ink-deep);
  font-family: Inter, "Segoe UI Variable Text", "Segoe UI", Arial, sans-serif;
  background:
    radial-gradient(circle at 50% 170px, rgba(34, 215, 207, 0.18), transparent 36%),
    radial-gradient(circle at 18% 18%, rgba(151, 222, 216, 0.22), transparent 24%),
    radial-gradient(circle at 88% 22%, rgba(230, 206, 158, 0.18), transparent 26%),
    linear-gradient(180deg, var(--paper-0) 0%, var(--paper-1) 42%, var(--paper-2) 100%);
}

.skills-page {
  position: relative;
  min-height: 100vh;
  overflow: hidden;
}

.topbar {
  position: relative;
  z-index: 10;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 28px;
  padding: 0 58px;
  background: linear-gradient(135deg, var(--teal-shell-from), var(--teal-shell-to));
  border-bottom: 1px solid var(--aqua-edge);
  box-shadow: 0 16px 38px rgba(4, 34, 40, 0.18);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  color: #fbf8ef;
  text-decoration: none;
}

.brand-badge {
  width: 42px;
  height: 42px;
  display: inline-grid;
  place-items: center;
  color: var(--aqua);
}

.brand-badge svg { width: 100%; height: 100%; }

.brand-word {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.03em;
}

.topnav {
  display: flex;
  align-items: center;
  gap: 34px;
  flex-wrap: wrap;
}

.topnav a {
  position: relative;
  color: rgba(248, 252, 250, 0.88);
  text-decoration: none;
  font-size: 16px;
  font-weight: 800;
}

.topnav a:hover,
.topnav a.is-active { color: #fff; }

.topnav a.is-active::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -16px;
  height: 2px;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent, var(--aqua), transparent);
  box-shadow: 0 0 16px rgba(34, 215, 207, 0.7);
}

.topnav a[aria-disabled="true"] {
  opacity: 0.6;
  cursor: default;
  pointer-events: none;
}

.skills-shell {
  position: relative;
  z-index: 1;
  max-width: 1080px;
  margin: 0 auto;
  padding: 64px 32px 72px;
}

.skills-hero { text-align: center; }

.hero-mark {
  display: inline-flex;
  align-items: center;
  gap: 18px;
  color: #9b681a;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 0.28em;
  text-transform: uppercase;
}

.hero-mark::before,
.hero-mark::after {
  content: "";
  width: 64px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.skills-hero h1 {
  margin: 18px 0 14px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(56px, 6vw, 88px);
  line-height: 0.96;
  letter-spacing: -0.05em;
  color: var(--ink-deep);
  text-shadow: 0 2px 0 rgba(255, 255, 255, 0.85);
}

.skills-hero p {
  margin: 0 auto;
  max-width: 720px;
  color: var(--ink-soft);
  font-size: 20px;
  line-height: 1.45;
}

.toolbar-card {
  margin: 38px auto 0;
  max-width: 720px;
  padding: 22px 24px;
  border: 1px solid rgba(255, 255, 255, 0.82);
  border-radius: 22px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 252, 246, 0.92));
  box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(18px);
}

.toolbar-row {
  display: block;
}

.toolbar-field {
  position: relative;
  flex: 1 1 480px;
  display: grid;
  gap: 8px;
}

.toolbar-field span {
  color: #0a5663;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.toolbar-field input {
  width: 100%;
  min-height: 52px;
  padding: 0 18px 0 50px;
  border: 1px solid rgba(55, 79, 92, 0.16);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.86);
  color: #223d4c;
  font: inherit;
  font-size: 16px;
  outline: none;
}

.toolbar-field input:focus {
  border-color: rgba(34, 215, 207, 0.6);
  box-shadow: 0 0 0 4px rgba(34, 215, 207, 0.12);
}

.toolbar-field::after {
  content: "";
  position: absolute;
  left: 18px;
  bottom: 16px;
  width: 18px;
  height: 18px;
  border: 2px solid #6b7f8c;
  border-radius: 999px;
  opacity: 0.7;
}

.toolbar-field::before {
  content: "";
  position: absolute;
  left: 33px;
  bottom: 14px;
  width: 8px;
  height: 2px;
  border-radius: 999px;
  background: #6b7f8c;
  transform: rotate(45deg);
  opacity: 0.7;
}

.page-button {
  min-height: 52px;
  padding: 0 28px;
  border: 0;
  border-radius: 14px;
  color: #f7fffd;
  font: inherit;
  font-size: 15px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--teal-shell-from), var(--teal-shell-to));
  box-shadow: 0 12px 26px rgba(7, 79, 84, 0.22);
  cursor: pointer;
}

.page-button:hover {
  transform: translateY(-1px);
  box-shadow: 0 16px 30px rgba(7, 79, 84, 0.26);
}

.status-pill {
  min-height: 52px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #294250;
  font-size: 15px;
  font-weight: 600;
}

.status-pill::before {
  content: "";
  width: 12px;
  height: 12px;
  border-radius: 999px;
  background: #2ac36a;
  box-shadow: 0 0 0 4px rgba(42, 195, 106, 0.12);
}

.status-pill[data-tone="working"]::before { background: #d9a441; }
.status-pill[data-tone="error"]::before { background: #d95757; }

.source-line {
  margin-top: 14px;
  color: #52707d;
  font-size: 13px;
  letter-spacing: 0.01em;
}

.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 18px;
  margin-top: 32px;
}

.skill-item {
  --accent: #28bda9;
  position: relative;
  display: grid;
  grid-template-columns: 76px minmax(0, 1fr);
  align-items: start;
  gap: 18px;
  padding: 22px 24px;
  border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
  border-radius: 18px;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(255, 251, 243, 0.92));
  box-shadow: var(--shadow-card);
  text-decoration: none;
  color: inherit;
  transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
}

.skill-item:hover {
  transform: translateY(-2px);
  border-color: color-mix(in srgb, var(--accent) 48%, transparent);
  box-shadow: 0 22px 50px rgba(20, 45, 58, 0.14);
}

.skill-item[data-accent="blue"] { --accent: #2f86c7; }
.skill-item[data-accent="aqua"] { --accent: #22aa9e; }
.skill-item[data-accent="gold"] { --accent: #c98b23; }

.skill-item::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 4px;
  border-radius: 18px 18px 0 0;
  background: linear-gradient(90deg, var(--accent), transparent 70%);
}

.skill-icon {
  width: 64px;
  height: 64px;
  display: grid;
  place-items: center;
  border-radius: 18px;
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 13%, white);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 26%, transparent);
}

.skill-icon svg { width: 32px; height: 32px; }

.skill-icon svg * {
  fill: none;
  stroke: currentColor;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.skill-main { min-width: 0; }

.skill-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
}

.skill-main h2 {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(23px, 2vw, 30px);
  line-height: 1.06;
  letter-spacing: -0.03em;
  color: var(--ink-deep);
}

.result-badge {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 28px;
  padding: 0 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.result-badge[data-tone="enable"] {
  color: #f7fffc;
  background: var(--success);
}

.result-badge[data-tone="review"] {
  color: #5f4108;
  background: rgba(201, 139, 35, 0.22);
}

.result-badge[data-tone="skip"] {
  color: #fff8f4;
  background: #b13f2f;
}

.skill-domain {
  margin-top: 6px;
  color: var(--ink-faint);
  font-size: 13px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-weight: 700;
}

.skill-result {
  margin-top: 12px;
  color: var(--ink-deep);
  font-family: "SFMono-Regular", Consolas, monospace;
  font-size: 14px;
  font-weight: 800;
}

.axis-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}

.axis-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.02em;
  background: rgba(14, 101, 116, 0.08);
  color: #0b5c6a;
}

.axis-chip[data-axis="utility"] {
  background: var(--success-soft);
  color: var(--success);
}

.axis-chip[data-axis="utility"][data-tone="tie"] {
  background: var(--neutral-soft);
  color: var(--neutral);
}

.axis-chip[data-axis="utility"][data-tone="negative"] {
  background: var(--warning-soft);
  color: var(--warning);
}

.axis-chip[data-axis="cost"] {
  background: rgba(20, 111, 123, 0.1);
  color: #0c5468;
}

.axis-chip[data-axis="cost"][data-tone="positive"] {
  background: var(--warning-soft);
  color: var(--warning);
}

.axis-chip[data-axis="safety"] {
  background: rgba(123, 97, 184, 0.14);
  color: #5a428f;
}

.axis-chip[data-axis="safety"][data-tone="warn"] {
  background: var(--warning-soft);
  color: var(--warning);
}

.axis-chip[data-axis="safety"][data-tone="danger"] {
  background: rgba(177, 63, 47, 0.14);
  color: #b13f2f;
}

.axis-chip[data-axis="stub"] {
  background: rgba(123, 97, 184, 0.12);
  color: #5a428f;
  font-style: italic;
}

.skill-item.is-stub {
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(244, 240, 230, 0.86));
  opacity: 0.97;
}

.skill-item.is-stub::before {
  background: linear-gradient(90deg, #7b61b8, transparent 70%);
}

.axis-chip::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: currentColor;
}

.detail-link {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
  color: #0a5663;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.02em;
}

.detail-link::after {
  content: "→";
  font-size: 16px;
}

.empty-skill-state {
  grid-column: 1 / -1;
  padding: 28px;
  border: 1px dashed var(--hairline);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.6);
  color: var(--ink-soft);
  text-align: center;
  font-size: 15px;
}

body.modal-open { overflow: hidden; }

.details-modal {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: none;
  padding: 34px;
}

.details-modal.is-open {
  display: grid;
  place-items: center;
}

.details-modal__backdrop {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 18%, rgba(34, 215, 207, 0.22), transparent 32%),
    rgba(0, 28, 32, 0.7);
  backdrop-filter: blur(10px);
}

.details-modal__panel {
  position: relative;
  z-index: 1;
  width: min(1180px, 96vw);
  height: min(820px, 88vh);
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  overflow: hidden;
  border: 1px solid rgba(34, 215, 207, 0.28);
  border-radius: 24px;
  background: rgba(249, 250, 246, 0.97);
  box-shadow: 0 32px 90px rgba(0, 24, 29, 0.42);
}

.details-modal__header {
  min-height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 16px 22px;
  border-bottom: 1px solid rgba(0, 63, 70, 0.12);
  background: linear-gradient(135deg, var(--teal-shell-from), var(--teal-shell-to));
  color: #f7faf8;
}

.details-modal__eyebrow {
  color: rgba(34, 215, 207, 0.92);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.details-modal__header h2 {
  margin: 4px 0 0;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 28px;
  line-height: 1.05;
}

.details-modal__close {
  width: 40px;
  height: 40px;
  border: 1px solid rgba(255, 255, 255, 0.28);
  border-radius: 12px;
  color: #f7faf8;
  background: rgba(255, 255, 255, 0.08);
  font-size: 28px;
  line-height: 1;
  cursor: pointer;
}

.details-modal__close:hover {
  border-color: rgba(34, 215, 207, 0.7);
  background: rgba(34, 215, 207, 0.16);
}

#details-modal-frame {
  width: 100%;
  height: 100%;
  border: 0;
  background: #fbf7ef;
}

@media (max-width: 800px) {
  .topbar {
    height: auto;
    padding: 14px 20px;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }

  .topnav { gap: 18px; flex-wrap: wrap; }
  .topnav a.is-active::after { bottom: -8px; }

  .skills-shell { padding: 36px 16px 48px; }
  .skills-hero h1 { font-size: 46px; }
  .skills-hero p { font-size: 17px; }

  .toolbar-card { padding: 18px; }
  .skills-grid { grid-template-columns: 1fr; }

  .details-modal { padding: 12px; }
  .details-modal__panel { width: 100%; height: 92vh; border-radius: 18px; }
}

  </style>
</head>

<script>
const PAPER_HREF = "";

const state = {
  dashboard: null,
  searchTerm: "",
};

function el(id) {
  return document.getElementById(id);
}

function formatNumber(value, digits = 0) {
  if (value === null || value === undefined || Number.isNaN(Number(value))) {
    return "-";
  }
  return Number(value).toLocaleString(undefined, {
    maximumFractionDigits: digits,
    minimumFractionDigits: digits,
  });
}

function formatPercent(value) {
  if (value === null || value === undefined || Number.isNaN(Number(value))) {
    return "-";
  }
  return `${formatNumber(Number(value) * 100, 1)}%`;
}

function formatSignedPercent(value) {
  if (value === null || value === undefined || Number.isNaN(Number(value))) {
    return "-";
  }
  const numeric = Number(value) * 100;
  const sign = numeric > 0 ? "+" : "";
  return `${sign}${formatNumber(numeric, 1)}pp`;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function examplesDir() {
  const params = new URLSearchParams(window.location.search);
  return params.get("examplesDir") || "";
}

function withExamplesDir(path, extra = {}) {
  const url = new URL(path, window.location.origin);
  const value = examplesDir();
  if (value) {
    url.searchParams.set("examplesDir", value);
  }
  Object.entries(extra).forEach(([key, item]) => {
    if (item) {
      url.searchParams.set(key, item);
    }
  });
  return `${url.pathname}${url.search}`;
}

async function fetchJson(url) {
  const response = await fetch(url);
  const payload = await response.json();
  if (!response.ok || !payload.ok) {
    throw new Error(payload.error || `HTTP ${response.status}`);
  }
  return payload;
}

function buildQuery(basePath, params) {
  const url = new URL(basePath, window.location.origin);
  Object.entries(params).forEach(([key, value]) => {
    if (value) {
      url.searchParams.set(key, value);
    }
  });
  return url.toString();
}

function updateStatus(label, tone) {
  const pill = el("status-pill");
  if (!pill) return;
  pill.textContent = label;
  pill.dataset.tone = tone;
}

function applyStaticLinks() {
  const paperLink = el("paper-nav");
  if (paperLink && PAPER_HREF) {
    paperLink.href = PAPER_HREF;
    paperLink.removeAttribute("aria-disabled");
    if (/^https?:\/\//i.test(PAPER_HREF)) {
      paperLink.target = "_blank";
      paperLink.rel = "noreferrer";
    }
  }

  document.querySelectorAll('a[href="/examples"]').forEach((node) => {
    node.href = "#";
    node.addEventListener("click", (e) => e.preventDefault());
  });
  document.querySelectorAll('a[href="/examples/skills"]').forEach((node) => {
    node.href = "#";

  });
  document.querySelectorAll('a[href="/examples/report"]').forEach((node) => {
    node.href = "#";
    node.addEventListener("click", (e) => e.preventDefault());
  });
}

      item.category,
      item.categoryLabel,
      ...(item.taskUtilityType?.items || []).map((entry) => entry.label),
    ].join(" ").toLowerCase();
    return haystack.includes(state.searchTerm);
  });
}

function reportHref(skillName) {
  // STANDALONE: link to sibling demo file in the same folder
  return "report.html?skill=" + encodeURIComponent(skillName);
}

function skillIcon(skillName) {
  if (skillName.includes("researcher")) {
    return '<svg viewBox="0 0 40 40"><circle cx="17" cy="17" r="10"/><path d="M25 25l9 9"/><path d="M13 17h8"/></svg>';
  }
  if (skillName.includes("advogado")) {
    return '<svg viewBox="0 0 40 40"><path d="M20 6v28"/><path d="M9 11h22"/><path d="M12 11l-6 12h12L12 11Z"/><path d="M28 11l-6 12h12L28 11Z"/><path d="M13 34h14"/></svg>';
  }
  return '<svg viewBox="0 0 40 40"><path d="M11 6h14l6 6v22H11z"/><path d="M25 6v8h8"/><path d="M16 19h10M16 25h12"/></svg>';
}

function skillAccent(skillName) {
  if (skillName.includes("researcher")) return "aqua";
  if (skillName.includes("advogado")) return "gold";
  return "blue";
}

function utilityChip(item) {
  const delta = Number(item.effectiveness?.passDeltaRate ?? 0);
  const wi = Number(item.effectiveness?.wiPassRate ?? 0);
  const wo = Number(item.effectiveness?.woPassRate ?? 0);
  if (Math.abs(delta) < 1e-6) {
    const ceiling = wi >= 1 - 1e-6 && wo >= 1 - 1e-6;
    return { tone: "tie", label: ceiling ? "Utility tied at ceiling" : "Utility tied" };
  }
  if (delta < 0) {
    return { tone: "negative", label: `Baseline leads ${formatSignedPercent(delta)}` };
  }
  return { tone: "positive", label: `Skill leads ${formatSignedPercent(delta)}` };
}

function recommendationLabel(item) {
  const delta = Number(item.effectiveness?.passDeltaRate ?? 0);
  const exceptions = Number(item.reliabilityError?.wiExceptionScenarios ?? 0);
  if (exceptions > 0) {
    return { tone: "review", label: "Needs review" };
  }
  if (delta > 0.05) {
    return { tone: "enable", label: "Promising" };
  }
  if (delta < -0.05) {
    return { tone: "skip", label: "No gain" };
  }
  return { tone: "review", label: "Inconclusive" };
}

function isScannerStub(item) {
  return item.source === "safety_only";
}

function renderSummary() {
  const root = state.dashboard?.root || {};
  el("page-subtitle").textContent =
    `${root.nExamples || 0} evaluated skills, summarized by WI vs WO task outcomes.`;
}

function renderSkills() {
  const items = visibleExamples();
  if (!items.length) {
    el("skills-grid").innerHTML = '<div class="empty-skill-state">No skills match the current search.</div>';
    return;
  }

  el("skills-grid").innerHTML = items.map((item) => {
    const accent = skillAccent(item.skillName);
    const stub = isScannerStub(item);
    const domain = item.categoryLabel || item.category || "";
    const utility = utilityChip(item);
    const recommendation = recommendationLabel(item);
    return `
      <a class="skill-item ${stub ? "is-stub" : ""}" data-accent="${escapeHtml(accent)}" href="${escapeHtml(reportHref(item.skillName))}">
        <div class="skill-icon" aria-hidden="true">${skillIcon(item.skillName)}</div>
        <div class="skill-main">
          <div class="skill-title-row">
            <h2>${escapeHtml(item.skillName)}</h2>
            <span class="result-badge" data-tone="${escapeHtml(recommendation.tone)}">${escapeHtml(recommendation.label)}</span>
          </div>
          ${domain ? `<div class="skill-domain">${escapeHtml(domain)}</div>` : ""}
          <div class="axis-row">
            <span class="axis-chip" data-axis="utility" data-tone="${escapeHtml(utility.tone)}">${escapeHtml(utility.label)}</span>
          </div>
          <span class="detail-link">View report</span>
        </div>
      </a>
    `;
  }).join("");
}

function ensureDetailsModal() {
  let modal = el("details-modal");
  if (modal) return modal;

  modal = document.createElement("div");
  modal.id = "details-modal";
  modal.className = "details-modal";
  modal.setAttribute("aria-hidden", "true");
  modal.innerHTML = `
    <div class="details-modal__backdrop" data-close-details></div>
    <section class="details-modal__panel" role="dialog" aria-modal="true" aria-labelledby="details-modal-title">
      <header class="details-modal__header">
        <div>
          <div class="details-modal__eyebrow">Skill Details</div>
          <h2 id="details-modal-title">Details</h2>
        </div>
        <button class="details-modal__close" type="button" aria-label="Close details" data-close-details>&times;</button>
      </header>
      <iframe id="details-modal-frame" title="Skill details"></iframe>
    </section>
  `;
  document.body.appendChild(modal);
  return modal;
}

function openDetailsModal(url, title) {
  const modal = ensureDetailsModal();
  const frame = el("details-modal-frame");
  const heading = el("details-modal-title");

  heading.textContent = title || "Details";
  frame.src = url;
  modal.classList.add("is-open");
  modal.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
}

function closeDetailsModal() {
  const modal = el("details-modal");
  const frame = el("details-modal-frame");
  if (!modal) return;

  modal.classList.remove("is-open");
  modal.setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
  if (frame) frame.src = "about:blank";
}

async function load() {
  updateStatus("Loading", "working");
  // STANDALONE: skip API call, use baked-in snapshot from window.__DASHBOARD__
  state.dashboard = window.__DASHBOARD__;
  renderSummary();
  renderSkills();
  updateStatus("Ready", "success");
}

function install() {
  applyStaticLinks();

  const reloadButton = el("reload-button");
  if (reloadButton) {
    reloadButton.addEventListener("click", () => {
      load().catch((error) => updateStatus(error.message, "error"));
    });
  }

  el("search-input").addEventListener("input", (event) => {
    state.searchTerm = event.target.value.trim().toLowerCase();
    renderSkills();
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      closeDetailsModal();
    }
  });
}

install();
load().catch((error) => updateStatus(error.message, "error"));

</script>
</body>
</html>
